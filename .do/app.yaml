# DigitalOcean App Platform spec — PUMPTANK static site (Next.js `output: export`).
# Deploy / update:  doctl apps update <app-id> --spec .do/app.yaml
#
# Uses a GitHub-connected source: every push to master auto-redeploys
# (deploy_on_push), and it always builds the latest commit. This requires the
# DigitalOcean GitHub app to be authorized on HankWyatt/pumptank (one-time, in
# the browser). After that, deploys are webhook-driven and need no API token.
name: pumptank
region: nyc
domains:
  - domain: thepumptank.fun
    type: PRIMARY
static_sites:
  - name: web
    github:
      repo: HankWyatt/pumptank
      branch: master
      deploy_on_push: true
    source_dir: web
    build_command: npm run build
    output_dir: out
    index_document: index.html
    error_document: 404.html
    envs:
      - key: SITE_URL
        value: https://thepumptank.fun
        scope: BUILD_TIME
