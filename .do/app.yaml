# DigitalOcean App Platform spec — PUMPTANK static site (Next.js `output: export`).
# Deploy:  doctl apps create --spec .do/app.yaml
# Update:  doctl apps update <app-id> --spec .do/app.yaml   (then create-deployment)
#
# Uses a public-git source (no DO<->GitHub authorization needed). To enable
# auto-deploy on every push, replace the `git:` block with:
#   github: { repo: HankWyatt/pumptank, branch: master, deploy_on_push: true }
# which requires authorizing the DigitalOcean GitHub app once (browser).
name: pumptank
region: nyc
static_sites:
  - name: web
    git:
      repo_clone_url: https://github.com/HankWyatt/pumptank.git
      branch: master
    source_dir: web
    build_command: npm run build
    output_dir: out
    index_document: index.html
    error_document: 404.html
    envs:
      - key: SITE_URL
        value: https://thepumptank.fun
        scope: BUILD_TIME
